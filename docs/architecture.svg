<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" font-family="Helvetica Neue, system-ui, sans-serif">
  <rect x="0" y="0" width="600" height="300" fill="#fbfdfc"/>
  <defs>
    <marker id="aA" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#0e8f57"/></marker>
  </defs>
  <text x="300" y="24" text-anchor="middle" font-size="12" fill="#5d6b63">your data in ↓</text>

  <!-- Layer 1 -->
  <rect x="120" y="36" width="360" height="58" rx="12" fill="#eef5f1" stroke="#cfe3d8"/>
  <circle cx="158" cy="65" r="13" fill="#fff" stroke="#0e8f57"/><text x="158" y="69" text-anchor="middle" font-size="12" fill="#0e8f57">1</text>
  <text x="185" y="60" font-size="14" font-weight="700" fill="#16201b">Domain Pack</text>
  <text x="185" y="79" font-size="12" fill="#5d6b63">a short list of your field's trusted tools</text>
  <line x1="300" y1="94" x2="300" y2="112" stroke="#0e8f57" stroke-width="2" marker-end="url(#aA)"/>

  <!-- Layer 2 -->
  <rect x="120" y="114" width="360" height="58" rx="12" fill="#eef5f1" stroke="#cfe3d8"/>
  <circle cx="158" cy="143" r="13" fill="#fff" stroke="#0e8f57"/><text x="158" y="147" text-anchor="middle" font-size="12" fill="#0e8f57">2</text>
  <text x="185" y="138" font-size="14" font-weight="700" fill="#16201b">Agent Core</text>
  <text x="185" y="157" font-size="12" fill="#5d6b63">plan · run the tools · record every step</text>
  <line x1="300" y1="172" x2="300" y2="190" stroke="#0e8f57" stroke-width="2" marker-end="url(#aA)"/>

  <!-- Layer 3 (highlight) -->
  <rect x="120" y="192" width="360" height="62" rx="12" fill="#e7f7ee" stroke="#0e8f57" stroke-width="2"/>
  <circle cx="158" cy="223" r="13" fill="#0e8f57"/><text x="158" y="227" text-anchor="middle" font-size="12" fill="#fff">3</text>
  <text x="185" y="218" font-size="14" font-weight="700" fill="#16201b">Trust &amp; Feedback</text>
  <text x="185" y="237" font-size="12" fill="#5d6b63">calibrated confidence → accept ✓ or ask a human ⚠</text>

  <!-- Feedback loop -->
  <path d="M480 223 C545 223, 545 65, 480 65" fill="none" stroke="#d98c00" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aA)"/>
  <text x="556" y="148" text-anchor="middle" font-size="11" fill="#d98c00" transform="rotate(90 556 148)">learns from each correction</text>
</svg>
